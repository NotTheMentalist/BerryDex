# BerryDex recipe — see CONTRIBUTING.md for the format!
name: 4-1-2 Juice
link: https://www.joshuaweissman.com/post/breakfast-sandwich-but-cheaper
berries: [sitrus]
notes: "Named for its citrus: 4 lemons, 1 orange, 2 limes. It's one component of Weissman's breakfast sandwich meal — scroll to the 4-1-2 Ade section. The published version makes about a litre; stretched to a gallon it's lighter and less syrupy, which is how it gets made here. A drink rather than an entrée: citrus resists the savory treatment."
