# BerryDex recipe — see CONTRIBUTING.md for the format!
name: 4-1-2 Juice
link: https://www.joshuaweissman.com/post/breakfast-sandwich-but-cheaper
berries: [sitrus]
notes: "A drink, not an entrée — the house rule bends here, because Sitrus isn't a fruit but a whole family of them, and citrus resists the savory treatment. Fittingly, this recipe calls out three of the main players at once: 4 lemons, 1 orange, 2 limes, which is where the name comes from. It's one component of Weissman's breakfast sandwich meal — scroll to the 4-1-2 Ade section. The published version makes about a litre; stretched to a gallon it's lighter and less syrupy, which is how it gets made here."
